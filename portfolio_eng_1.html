<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Engineer Portfolio - John Doe</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .selection-blue::selection { background: rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 selection-blue">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Mocking Lucide icons for the standalone version
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [filter, setFilter] = useState('All');

            const projects = [
                {
                    id: 1,
                    title: "Real-time E-commerce Analytics Pipeline",
                    category: "Streaming",
                    image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop",
                    description: "Built a high-throughput event streaming system processing 100k+ clickstream events/sec for real-time inventory dashboards.",
                    architecture: "Kafka -> Spark Streaming -> Delta Lake -> PowerBI",
                    tech: ["Spark", "Kafka", "Databricks", "Azure"],
                    impact: "Reduced data latency from 15 minutes to sub-10 seconds.",
                    github: "#"
                },
                {
                    id: 2,
                    title: "Enterprise Data Warehouse Automation",
                    category: "Batch",
                    image: "https://images.unsplash.com/photo-1558494949-ef010cbdcc48?q=80&w=800&auto=format&fit=crop",
                    description: "Automated ETL workflows for 50+ diverse data sources into BigQuery, ensuring high data integrity and observability.",
                    architecture: "Airflow -> dbt -> Google BigQuery -> Looker",
                    tech: ["Python", "Airflow", "dbt", "BigQuery", "GCP"],
                    impact: "Saved 20+ manual engineering hours per week for the Analytics team.",
                    github: "#"
                },
                {
                    id: 3,
                    title: "Customer 360 Data Lakehouse",
                    category: "Architecture",
                    image: "https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=800&auto=format&fit=crop",
                    description: "Architected a unified Lakehouse platform for structured and unstructured data to power downstream ML models.",
                    architecture: "S3 -> AWS Glue -> Iceberg -> Trino",
                    tech: ["AWS", "Terraform", "Iceberg", "Trino", "SQL"],
                    impact: "Improved complex query performance by 40% compared to legacy warehouse.",
                    github: "#"
                },
                {
                    id: 4,
                    title: "Log Aggregation & Monitoring System",
                    category: "Infrastructure",
                    image: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=800&auto=format&fit=crop",
                    description: "Deployed a centralized logging system for Kubernetes clusters to enable automated alerting and anomaly detection.",
                    architecture: "Fluentd -> Elasticsearch -> Kibana",
                    tech: ["Kubernetes", "Docker", "ELK Stack", "Prometheus"],
                    impact: "Decreased mean-time-to-detect (MTTD) system failures to under 2 minutes.",
                    github: "#"
                }
            ];

            const categories = ['All', 'Streaming', 'Batch', 'Architecture', 'Infrastructure'];
            const filteredProjects = filter === 'All' ? projects : projects.filter(p => p.category === filter);

            return (
                <div className="min-h-screen">
                    {/* Header/Nav */}
                    <nav className="fixed top-0 w-full z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 font-bold text-xl text-white">
                                <Icon name="database" size={24} className="text-blue-500" />
                                <span className="tracking-tight">DE_PORTFOLIO</span>
                            </div>
                            <div className="hidden md:flex gap-8 text-sm font-medium">
                                <a href="#about" className="hover:text-blue-400 transition-colors">Skills</a>
                                <a href="#projects" className="hover:text-blue-400 transition-colors">Projects</a>
                                <a href="#contact" className="hover:text-blue-400 transition-colors">Contact</a>
                            </div>
                            <button className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2">
                                <Icon name="file-text" size={16} /> DOWNLOAD CV
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="pt-40 pb-20 px-6">
                        <div className="max-w-4xl mx-auto text-center">
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold mb-6 uppercase tracking-widest">
                                <Icon name="cpu" size={14} /> Data Engineer & Architect
                            </div>
                            <h1 className="text-5xl md:text-7xl font-extrabold text-white mb-6 tracking-tight leading-tight">
                                Engineering <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Scalable Data</span> Platforms
                            </h1>
                            <p className="text-xl text-slate-400 mb-10 max-w-2xl mx-auto leading-relaxed">
                                I am <strong>John Doe</strong>. Specialist in designing and operating high-performance ETL/ELT systems that turn raw data into strategic assets.
                            </p>
                            <div className="flex justify-center gap-4">
                                <a href="#" className="p-3 rounded-full bg-slate-800 hover:bg-slate-700 transition-all text-white"><Icon name="github" /></a>
                                <a href="#" className="p-3 rounded-full bg-slate-800 hover:bg-slate-700 transition-all text-white"><Icon name="linkedin" /></a>
                                <a href="#" className="p-3 rounded-full bg-slate-800 hover:bg-slate-700 transition-all text-white"><Icon name="mail" /></a>
                            </div>
                        </div>
                    </section>

                    {/* Tech Stack */}
                    <section id="about" className="py-20 bg-slate-900/50">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="grid md:grid-cols-4 gap-8">
                                <div className="p-6 rounded-2xl border border-slate-800 bg-[#0f172a] hover:border-blue-500/50 transition-all">
                                    <Icon name="wind" size={32} className="text-blue-400 mb-4" />
                                    <h3 className="font-bold text-white mb-2">Orchestration</h3>
                                    <p className="text-sm text-slate-400">Airflow, Prefect, Dagster</p>
                                </div>
                                <div className="p-6 rounded-2xl border border-slate-800 bg-[#0f172a] hover:border-emerald-400/50 transition-all">
                                    <Icon name="layers" size={32} className="text-emerald-400 mb-4" />
                                    <h3 className="font-bold text-white mb-2">Processing</h3>
                                    <p className="text-sm text-slate-400">Spark, Flink, dbt, Python</p>
                                </div>
                                <div className="p-6 rounded-2xl border border-slate-800 bg-[#0f172a] hover:border-purple-400/50 transition-all">
                                    <Icon name="cloud" size={32} className="text-purple-400 mb-4" />
                                    <h3 className="font-bold text-white mb-2">Cloud & Storage</h3>
                                    <p className="text-sm text-slate-400">AWS, GCP, Snowflake, Delta Lake</p>
                                </div>
                                <div className="p-6 rounded-2xl border border-slate-800 bg-[#0f172a] hover:border-orange-400/50 transition-all">
                                    <Icon name="server" size={32} className="text-orange-400 mb-4" />
                                    <h3 className="font-bold text-white mb-2">Streaming</h3>
                                    <p className="text-sm text-slate-400">Kafka, Redpanda, Kinesis</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Projects Grid */}
                    <section id="projects" className="py-24 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                                <div>
                                    <h2 className="text-4xl font-bold text-white mb-4">Featured Projects</h2>
                                    <p className="text-slate-400">Data systems I have designed, implemented, and optimized.</p>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {categories.map(cat => (
                                        <button 
                                            key={cat}
                                            onClick={() => setFilter(cat)}
                                            className={`px-4 py-2 rounded-full text-xs font-bold transition-all ${filter === cat ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid lg:grid-cols-2 gap-8">
                                {filteredProjects.map((project) => (
                                    <div key={project.id} className="group relative bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden hover:border-blue-500/30 transition-all duration-500">
                                        <div className="grid md:grid-cols-5 h-full">
                                            <div className="md:col-span-2 relative h-48 md:h-full overflow-hidden">
                                                <img 
                                                    src={project.image} 
                                                    alt={project.title}
                                                    className="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                                                />
                                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent md:bg-gradient-to-r"></div>
                                            </div>
                                            <div className="md:col-span-3 p-8 flex flex-col justify-between">
                                                <div>
                                                    <div className="flex items-center justify-between mb-4">
                                                        <span className="px-3 py-1 rounded-full bg-blue-500/10 text-blue-400 text-[10px] font-bold uppercase tracking-widest border border-blue-500/20">
                                                            {project.category}
                                                        </span>
                                                        <a href={project.github} className="text-slate-500 hover:text-white transition-colors">
                                                            <Icon name="github" size={20} />
                                                        </a>
                                                    </div>
                                                    <h3 className="text-2xl font-bold text-white mb-3 group-hover:text-blue-400 transition-colors">
                                                        {project.title}
                                                    </h3>
                                                    <p className="text-slate-400 text-sm mb-4 leading-relaxed">
                                                        {project.description}
                                                    </p>
                                                    
                                                    <div className="space-y-3 mb-6">
                                                        <div className="flex items-start gap-2">
                                                            <Icon name="terminal" size={14} className="text-blue-500 mt-1 flex-shrink-0" />
                                                            <p className="text-xs font-mono text-slate-300">Architecture: {project.architecture}</p>
                                                        </div>
                                                        <div className="flex items-start gap-2">
                                                            <Icon name="bar-chart-3" size={14} className="text-emerald-500 mt-1 flex-shrink-0" />
                                                            <p className="text-xs text-emerald-400 font-medium">Impact: {project.impact}</p>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="flex flex-wrap gap-2">
                                                    {project.tech.map(t => (
                                                        <span key={t} className="text-[10px] font-bold px-2 py-1 bg-slate-800 text-slate-300 rounded border border-slate-700 uppercase tracking-tighter">
                                                            {t}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Stats Section */}
                    <section className="py-20 border-y border-slate-800">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-12 text-center">
                            <div>
                                <p className="text-4xl font-bold text-white mb-2">50TB+</p>
                                <p className="text-xs text-slate-500 uppercase tracking-widest font-bold">Data Managed</p>
                            </div>
                            <div>
                                <p className="text-4xl font-bold text-white mb-2">100+</p>
                                <p className="text-xs text-slate-500 uppercase tracking-widest font-bold">Pipelines Built</p>
                            </div>
                            <div>
                                <p className="text-4xl font-bold text-white mb-2">99.9%</p>
                                <p className="text-xs text-slate-500 uppercase tracking-widest font-bold">Uptime Guaranteed</p>
                            </div>
                            <div>
                                <p className="text-4xl font-bold text-white mb-2">40%</p>
                                <p className="text-xs text-slate-500 uppercase tracking-widest font-bold">Cost Optimized</p>
                            </div>
                        </div>
                    </section>

                    {/* CTA Section */}
                    <section id="contact" className="py-24 px-6 text-center">
                        <div className="max-w-3xl mx-auto p-12 rounded-[3rem] bg-gradient-to-br from-blue-600 to-indigo-700 relative overflow-hidden shadow-2xl">
                            <div className="absolute top-0 right-0 -mr-10 -mt-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                            <div className="relative z-10">
                                <h2 className="text-3xl md:text-5xl font-bold text-white mb-6">Need a Solid Data Foundation?</h2>
                                <p className="text-blue-100 mb-8 text-lg opacity-90 font-medium">
                                    Let's discuss how we can build a robust, scalable data architecture for your organization.
                                </p>
                                <div className="flex flex-col md:flex-row justify-center gap-4">
                                    <a href="mailto:email@example.com" className="bg-white text-blue-700 px-8 py-4 rounded-2xl font-bold text-lg hover:scale-105 transition-transform flex items-center justify-center gap-2">
                                        <Icon name="mail" size={20} /> SEND EMAIL
                                    </a>
                                    <a href="#" className="bg-blue-800 text-white border border-blue-400/30 px-8 py-4 rounded-2xl font-bold text-lg hover:bg-blue-900 transition-all flex items-center justify-center gap-2">
                                        BOOK A CALL <Icon name="chevron-right" size={20} />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 border-t border-slate-800 text-center text-slate-500">
                        <p className="text-sm">© 2024 John Doe. Built for data reliability and scale.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
